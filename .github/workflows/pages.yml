name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site/internal/output _site/camp
          cp -R index.html assets wellness-qa _site/
          cp camp/China_Youth_AI_Robotics_Camp_Admissions_Brochure_No_University_Logos.pdf _site/camp/
          cp camp/China_Youth_Cultural_Exchange_Camp_Admissions_Brochure_Clean.pdf _site/camp/
          cp camp/China_Wellness_Cultural_Immersion_Retreat_10-Day_Program.pdf _site/camp/
          cp camp/China_Wellness_Cultural_Immersion_Retreat_10-Day_Program_EN.pdf _site/camp/
          cp camp/China_Wellness_Cultural_Immersion_Retreat_10-Day_Program_ZH.pdf _site/camp/
          cp .nojekyll _site/.nojekyll
          cp internal/output/wellness-frequent-qa.pdf _site/internal/output/wellness-frequent-qa.pdf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
